<div class="flex h-screen overflow-hidden bg-slate-100">

  <!-- Sidebar -->
  <aside
    class="flex flex-col bg-slate-900 text-white transition-all duration-300 ease-in-out shrink-0 shadow-xl"
    [class.w-64]="sidenavOpen()"
    [class.w-0]="!sidenavOpen()"
  >
    <div class="overflow-hidden w-64 flex flex-col h-full">

      <!-- Logo -->
      <div class="flex items-center gap-3 px-5 py-5 border-b border-slate-700/60">
        <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-indigo-500 to-violet-600 flex items-center justify-center shrink-0 shadow-lg shadow-indigo-500/30">
          <mat-icon class="text-white" style="font-size:18px;width:18px;height:18px">bar_chart</mat-icon>
        </div>
        <span class="text-base font-bold tracking-wide whitespace-nowrap bg-gradient-to-r from-white to-slate-300 bg-clip-text text-transparent">
          {{ 'NAV.APP_NAME' | translate }}
        </span>
      </div>

      <!-- Nav -->
      <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
        @for (item of navItems; track item.route) {
          <a
            [routerLink]="item.route"
            routerLinkActive="bg-indigo-600/20 text-indigo-300 border-l-2 border-indigo-400"
            [routerLinkActiveOptions]="{ exact: true }"
            class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-all duration-150 whitespace-nowrap group border-l-2 border-transparent"
          >
            <mat-icon class="text-xl shrink-0 group-hover:text-indigo-400 transition-colors">{{ item.icon }}</mat-icon>
            <span class="text-sm font-medium">{{ item.label | translate }}</span>
          </a>
        }
      </nav>

      <!-- User & Logout -->
      <div class="px-3 py-4 border-t border-slate-700/60 space-y-1">
        <button
          (click)="logout()"
          class="flex items-center gap-3 w-full px-4 py-2.5 rounded-lg text-slate-400 hover:bg-red-500/10 hover:text-red-400 transition-all duration-150 group border-l-2 border-transparent"
        >
          <mat-icon class="text-xl shrink-0 group-hover:text-red-400 transition-colors">logout</mat-icon>
          <span class="text-sm font-medium whitespace-nowrap">{{ 'NAV.LOGOUT' | translate }}</span>
        </button>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="flex flex-col flex-1 overflow-hidden">

    <!-- Top Navbar -->
    <header class="flex items-center justify-between bg-white border-b border-slate-200 px-5 py-3 shadow-sm shrink-0">
      <div class="flex items-center gap-3">
        <button
          (click)="toggleSidenav()"
          class="p-2 rounded-lg text-slate-500 hover:bg-slate-100 hover:text-slate-700 transition-colors"
        >
          <mat-icon>{{ sidenavOpen() ? 'menu_open' : 'menu' }}</mat-icon>
        </button>
        <h1 class="text-base font-semibold text-slate-800">{{ 'HEADER.DASHBOARD' | translate }}</h1>
      </div>

      <div class="flex items-center gap-2">

        <!-- Language Selector -->
        <button
          [matMenuTriggerFor]="langMenu"
          class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-slate-600 border border-slate-200 bg-slate-50 hover:bg-slate-100 transition-colors"
        >
          <mat-icon style="font-size:16px;width:16px;height:16px;line-height:16px" class="text-slate-500 shrink-0">language</mat-icon>
          <span class="text-xs font-medium hidden sm:block">{{ currentLangLabel() }}</span>
          <mat-icon style="font-size:16px;width:16px;height:16px;line-height:16px" class="text-slate-400 shrink-0">expand_more</mat-icon>
        </button>

        <mat-menu #langMenu="matMenu" panelClass="nav-menu-panel">
          @for (lang of langService.languages; track lang.code) {
            <button mat-menu-item (click)="langService.setLanguage(lang.code)"
                    [class.nav-menu-item-active]="langService.currentLang() === lang.code">
              {{ lang.label }}
            </button>
          }
        </mat-menu>

        <!-- User Menu -->
        <button
          [matMenuTriggerFor]="userMenu"
          class="flex items-center gap-2 px-3 py-1.5 rounded-lg hover:bg-slate-100 transition-colors"
        >
          <div class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-violet-600 flex items-center justify-center text-white text-sm font-bold shadow-sm shrink-0">
            {{ username.charAt(0).toUpperCase() }}
          </div>
          <span class="text-sm font-medium text-slate-700 hidden sm:block">{{ username }}</span>
          <mat-icon class="text-slate-400" style="font-size:16px;width:16px;height:16px;line-height:16px">expand_more</mat-icon>
        </button>

        <mat-menu #userMenu="matMenu" panelClass="nav-menu-panel">
          <div class="nav-menu-user-header" (click)="$event.stopPropagation()">
            <p class="nav-menu-user-name">{{ username }}</p>
            <p class="nav-menu-user-sub">{{ 'NAV.SIGNED_IN' | translate }}</p>
          </div>
          <button mat-menu-item (click)="logout()" class="nav-menu-danger">
            <mat-icon>logout</mat-icon>
            <span>{{ 'NAV.LOGOUT' | translate }}</span>
          </button>
        </mat-menu>

      </div>
    </header>

    <!-- Page Content -->
    <main class="flex-1 overflow-auto p-6 bg-slate-100">
      <router-outlet />
    </main>
  </div>
</div>
